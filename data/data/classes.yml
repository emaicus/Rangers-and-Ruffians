-   name: Bard
    class_type: Support
    recommended_stats:
        Charisma: 2
        Dexterity: 0
        Inner_Fire: -1
        Intelligence: 1
        Strength: -1
    weapon_training:
        - Focuses
    # expertise: "As a bard, your raw charisma is second to none. Take expertise in all charisma checks. Further,
    #             take expertise in any checks made to perform for others and in all attempts at sleight of hand."
    handbook:
        -   title: Intro
            display_title: false
            text: "Weaver of tales. With their magical melodies, Bards are the heart and soul of every adventure. 
                  While wizards use hard-won knowledge and Druids use the power of nature, Bard's channel
                  the power of pure charisma to author the world around them. Bards take the roll of support caster,
                  shaking the resolve of enemies and shaping the face of the battlefield. Many bards are the face
                  of their adventuring party, using their wit and tact to expertly navigate social situations."
        -   title: "When Adventuring"
            display_title: true 
            text: "A bard's magic can be invaluable when adventuring. Spells like Conjure Illusion and Disguise, and Trick up Your Sleeve
                can help a party get out of sticky situations, while Song of Healing can keep party members on their feet in combat.
                Bards leave feats of strength to the martial classes, but it is not out of the ordinary 
                for a highly dextrous bard to sneak into danger alongside the party rogue."
        -   title: "When Socializing"
            display_title: true 
            text: "Bards shine in social situations, where their high charisma and arsenal of spells such as 
                    Suggestion and Modify Memory help them glean information and escape social traps.
                    Some bards travel town to town and leave a string of heartbroken lovers in their wake, while others climb to the highest echelons of society."
        -   title: "When in Combat"
            display_title: true 
            text: "Bards are capable support casters. Spells like Slow and Racous Laughter allow them to weaken their enemies,
                    while Haste empowers their allies. They also make adept healers, casting spells like
                    Song of Healing and Song of Mass Healing. While their damage output may not match wizards or warlocks, spells like Biting Words 
                    and Power Chord are still formidable, and the Bard's versitility is second to none."
    health_schedule: 
        starting_health: 6
        standard_level_health_bonus: 2
        tier_increase_health_bonus: 2
    discoverable_abilities:
        tier_1: #6/6
            -   name: Slow
                action_type: Offhand Action
                type: debuff
                cost: 0
                duration: save
                requirements:
                    movement: true 
                    verbal: true 
                    components: 
                        - A spoonful of honey
                description: "Like honey, your words drip over your target."
                range: 60
                effect:
                    type: debuff
                    description: "Make an Inner Fire Resistance Check. On success, they are Hindered until the end of their next turn."
                    conditions: 
                        - hindered
                    save: null 
            -   name: Raucous Laughter
                action_type: Action
                type: aoe debuff
                cost: 1
                duration: save
                requirements:
                    movement: false 
                    verbal: true 
                range: self
                radius: 60
                description: "You fire a quip laced with magic at a foe."
                effect:
                    description: "Make an Inner Fire Resistance Check. On success, they fall to the ground in laughter and are Incapacitated."
                    conditions: 
                        - incapacitated
                    type: debuff
                    save: "Repeat your check at the end of each of your turns or or every minute when out of combat. The effect ends instantly if they are injured."
            -   name: Trick up Your Sleeve
                action_type: Offhand Action
                type: utility
                cost: 0
                duration: instantaneous
                requirements:
                    movement: true 
                    verbal: true 
                    components: 
                        - A pocket or sleeve
                description: "Your sleeve contains a small pocket dimension, capable of holding up to one cubic foot of material.
                            Once you've hidden something up your sleeve, only you may retrieve it. If you fall unconcious or die,
                            anything hidden in your sleeve instantly pops out."
                range: self
                upcast: "You can spend an action point on this spell to summon up to one hundred feet 
                        of tied together cloths from your sleeve. The cloths are bound tightly enough that
                        they may be treated as rope."
            -   name: Suggestion
                action_type: Offhand Action
                type: utility
                cost: 1
                duration: 1 hour
                requirements:
                    movement: true 
                    verbal: true 
                description: "Your honeyed words are laced with irresistible magic as you speak earnestly to your target.
                            Make an Inner Fire Resistance Check. On success, they believe the next ten words you speak.
                            They are able to reassess their feelings if they are presented with facts to the contrary. In such a case, You 
                            must repeat your check at disadvantage."
                range: 30
            -   name: Conjure Illusion
                action_type: Offhand Action
                type: utility
                cost: 1
                duration: concentration
                range: 60
                requirements:
                        movement: true 
                        verbal: true 
                description: "You are able to conjure a realistic but unmoving illusory image of horse-size or smaller."
                upcast: "If you spend another action point you may create a programmed illusion with both weight and texture and which can be capable of
                    movement and speech. You may establish five scripted responses it is capable of making and tell it where to move."    
            -   name: Immovable
                action_type: Offhand Action
                type: utility
                cost: 1
                duration: concentration
                requirements:
                    movement: true 
                    verbal: true 
                description: "With unwavering focus, you channel your energy into an unyielding force that anchors
                            a chosen object in place. The object must be smaller than a wagon, and cannot be a living creature. The spell
                            ends if you move further than the radius from the object or if you lose concentration on it."
                range: 30
                radius: 300
        tier_2: # 5/5
            -   name: Modify Memory
                action_type: Offhand Action
                type: debuff
                cost: 2
                duration: 1 day
                requirements:
                    movement: false 
                    verbal: false 
                description: "Tapping into your magic, you tell a compelling lie."
                effect:
                    type: debuff
                    description: "Make an Inner Fire Resistance Check. On success, modify a memory
                                of your choosing. The target tries to rationalize the modified memory within reason, but will realize what happened if provided with adequate proof."
                    conditions:
                        - custom
                    save: null
                range: 60
            -   name: Disguise # Merge Disguise and Imitate
                action_type: Offhand Action
                type: utility
                cost: 1
                duration: concentration
                requirements:
                    movement: false 
                    verbal: true 
                description: "With a whispered incantation, you cloak your true form in a shimmering veil of illusion so that you appear to be
                                someone else. You must appear humanoid and be within one foot
                                of your current height. Your disguise can include a new wardrobe. Magical alterations are ethereal and do
                                not hold up to physical inspection."
                range: self
            -   name: Tamberdoodle's Grasp
                action_type: Action
                type: summoning
                cost: 2
                duration: concentration
                range: 15
                radius: 90
                requirements:
                    movement: true 
                    verbal: true 
                    components: 
                        - A glove
                description: "Gripping one of your arms at the wrist, you conjure a massive hand made of magical energy in an unoccupied space of your choosing.
                              You are able to command the hand as though it is an extension of your
                                body, though it must remain within the spell's radius. The hand remains until it falls to zero health or you lose concentration
                                on it."
                summoned_creature: 
                    all_tiers: Tamberdoodle's Hand
            -   name: Hava's Tricksy Escape
                action_type: Offhand Action
                type: buff
                cost: 2
                duration: 5 minutes
                range: self 
                requirements:
                    movement: false 
                    verbal: true 
                description: "Close your eyes and repeat three times 'Whisked away, vanished' and then 'Poof!'
                            As you finish, you disappear and a perfect, illusory duplicate appears in your place.
                            The illusion is an echo of your soul and moves and acts as you would have for the spell's duration.
                            When the spell ends, your duplicate disappears and you receive its memories."
                effect:
                    type: buff
                    description: "While the spell is active, you are Invisible."
                    conditions:
                        - invisible 
                    save: null
            -   name: Invisible Servant
                action_type: Offhand Action
                type: summoning
                cost: 1
                duration: 1 hour
                requirements:
                    movement: true 
                    verbal: true 
                    components: 
                        - A scrap of noble clothing
                description: "With a snap of your fingers, you summon an invisible servant to aid you. 
                            The servant has no mind of its own, but is instead a manifestation of you 
                            will, and follows your orders to the letter. Invisible servants use your Inner Fire
                            as their Dexterity and Strength modifier and have 1 hit point."
                range: 30
        tier_3: # 3/3
            -   name: Edmire's Grand Manor # B tier
                action_type: Offhand Action
                type: utility
                cost: 1
                duration: 1 day
                casting_time: 10 Minutes
                requirements:
                    movement: true 
                    verbal: true
                description: "When you learn this spell, a key appears in your hand.
                        Any time that you wish, you may cast it to cause a matching door to appear. Within, 
                        is a lavish mansion, stocked with food and drink and manned by 100 servants.
                        You may design the mansion to have rooms that suit the needs
                        of your party
                        Nothing that originates in the mansion may leave, but what is brought in may stay.
                        Once a door to the mansion is used, it lingers
                        for ten minutes. During that time, anyone that finds it may attempt to break in."
                range: 300
            -   name: Summon Bleck # A tier
                action_type: Action
                type: utility
                cost: 3
                duration: 1 hour
                casting_time: 10 Minutes
                range: touch
                requirements:
                    movement: true 
                    verbal: true 
                    components: 
                        - A piece of coal blessed by a high priest of Juliet (100gp)
                description: "Summon a mighty bleck to fight for you! A bleck is a gooey
                        creature, one inch in diameter. Bleck have 1hp, and cannot attack. 
                        They move only one foot per minute. Bleck cannot be
                        damaged by blades, as they will merely split and then
                        reform. After one minute, a bleck splits into two blecks. Each of these
                        wait for one minute then split into two more. The weight of a
                        million bleck is enough to kill a bleck. Bleck that are killed remain for 1 minute
                        before dissolving into nothingness. After the spell's duration, all bleck are destroyed."
            -   name: I Know Malkizar! # A tier # Everyone who witnessed an event must make a SP save or be convinced
                action_type: Ritual
                type: utility
                cost: 3
                duration: infinite
                range: self
                radius: infinite
                casting_time: 1 day
                requirements:
                    verbal: true 
                    movement: true 
                    components:
                        - A Siren's Tongue (50 gp)
                        - A Dragon's Heart (1000 gp)
                        - An Orb of Shadow (rare, 100,000 gp)
                description: "Gather your strength and perform an ancient ritual of obfuscation.
                        Alter the mind of everyone who viewed an event by convincing them that there was another
                        person present named Malkizar. In fourteen words or fewer, describe what Malkizar
                        did. Everyone who witnessed the event now earnestly believes that Malkizar
                        was present and performed the action you described."
    spells:
        tier_1: #6/6
            -   name: Power Chord
                action_type: Action
                type: damage
                cost: 1
                duration: instantaneous
                requirements:
                    movement: false 
                    verbal: true 
                description: "A pulse of sonic energy streaks from you in all directions, sparing allies and harming foes."
                range: self
                radius: 25
                damage_scaling:
                    damage_type: "psychic"
                    tier_1: 1d8
                    tier_2: 1d10
                    tier_3: 1d12
                effect:
                    description: "Make an Inner Fire Resistance Check of any creature hit by the spell. On success, they are pushed back fifteen feet and Staggered."
                    type: debuff
                    conditions: 
                        - staggered
                    save: null
            -   name: Biting Words #Bard
                action_type: Action
                type: "damage"
                cost: 0
                range: 60
                duration: instantaneous
                requirements:
                    movement: true 
                    verbal: true 
                damage_scaling: 
                    damage_type: "psychic"
                    tier_1: 1d6 #(3.5 + 3.5f = 7)
                    tier_2: 1d8 #(7 + 7f = 14)
                    tier_3: 1d10 #(10.5 + 10.5f = 21)
                description: "As you utter an magical insult, a set of ethereal
                                teeth appear and bite your target."
                effect:
                    description: "If you roll max damage, they are hindered until your next turn."
                    type: debuff
                    save: null
                    conditions: 
                        - hindered
                upcast: "For every action point spent on this spell, increase its range by 60ft."
            -   name: Breathe Fire # Bard
                action_type: Action
                type: aoe damage
                cost: 1
                duration: instantaneous
                requirements:
                    movement: true 
                    verbal: true 
                    components: 
                        - A mouthful of oil
                description: "Magical warmth floods into your stomach before bubbling up and out. 
                            You belch a cone of fire, igniting anything before you."
                range: 15
                damage_scaling:
                    damage_shape: cone
                    damage_type: fire
                    tier_1: 1d6 # (2.5 + 3.5f + 3inf x 2 = 9 each x 2 = 18 overall)
                    tier_2: 1d8 # (5 + 7f + 4inf x 2 = 16 each x2 = 32 overall)
                    tier_3: 1d10 # (7.5 + 10.5f + 5inf x 2 = 23 each x 2 = 46 overall)
                effect:
                    description: "Make an Inner Fire Resistance Check against your targets. On success, they begin Burning."
                    type: debuff
                    conditions: 
                        - burning
                    save: null
            -   name: Blocking Hand
                action_type: Reaction
                type: utility
                cost: 1
                duration: instantaneous
                requirements:
                    movement: true 
                    verbal: true 
                    components: 
                        - An old glove
                description: "Summon an unseen force of protection to hinder an enemy attack.
                                Make an Inner Fire Resistance Check. On success,
                                their attack misses. On failure, it deals half damage."
                range: 30
            -   name: Song of Healing
                action_type: Offhand Action
                type: healing
                cost: 1
                duration: 1
                description: "Your voice fills the air in a soothing melody, and a gentle wave of magic washes over your target. 
                            Their wounds begin to heal over and their vitality is restored."
                requirements:
                    movement: true 
                    verbal: true 
                damage_scaling: 
                    damage_type: "healing"
                    tier_1: "1d6"
                    tier_2: "2d6"
                    tier_3: "4d6"
                range: 30
            -   name: Distract
                action_type: Offhand Action
                type: debuff
                cost: 0
                duration: concentration
                requirements:
                    movement: true 
                    verbal: true 
                description: "Magically project your voice into an enemy's ears."
                range: 60
                effect:
                    description: "Make an Inner Fire Resistance Check. On success, they are staggered."
                    type: debuff
                    conditions:
                        - staggered
                    save: null
        tier_2: # 5/5
            -   name: Kilgore's Thunderous Shout # Bard
                action_type: Action
                type: aoe damage
                cost: 2
                duration: instantaneous
                requirements:
                    movement: true 
                    verbal: true 
                description: "You release a mighty shout inspired by the fearsome energy of Kilgore, barbarian minstrel of the realm of cheese and mead."
                range: 20
                damage_scaling:
                    damage_type: acoustic
                    damage_shape: cone
                    scaled_by:
                        weapon: false
                    tier_2: 3d6 #(10.5 vs 2d10 11)
                    tier_3: 4d6 #(14 vs 2d12 13)
                effect:
                    type: debuff
                    conditions: 
                        - prone
                    description: "Make an Inner Fire Resistance Check. On success, they are thrown back 15ft and knocked prone."
                    save: null
                upcast: "For each additional action point spent on this spell, increase damage by 1d6 and push enemies 10ft further."     
            -   name: Song of Mass Healing
                action_type: Offhand Action
                type: aoe healing
                cost: 2
                duration: instantaneous
                requirements:
                    movement: false 
                    verbal: true 
                description: "Your voice swells with divine resonance. At the sound, your allies' wounds begin to knit themselves shut."
                upcast: "For each additional action point spent on this spell, increase its radius by 15ft and add an additional dice."
                damage_scaling:
                    damage_type: healing
                    tier_2: 2d4
                    tier_3: 3d4
                range: self
                radius: 15
            -   name: Counter Magic
                type: utility
                cost: 1
                duration: instantaneous
                action_type: Reaction
                requirements:
                    movement: false 
                    verbal: true 
                range: 60
                description: "As an enemy attempts to cast a spell, use your power to disrupt them. 
                    If the enemy is a minion, their spell instantly fails. Otherwise, 
                    make an Inner Fire Resistance Check. On success, their spell is blocked.
                    Counter Magic does not affect natural abilities such as a dragon's fire breath."
                upcast: "You may spend an additional action point on this spell to make your check with advantage, or two more to cause it to work without a check."
            -   name: Minor Gate
                action_type: Offhand Action
                type: utility
                cost: 1
                duration: instantaneous
                requirements:
                    movement: true 
                    verbal: true 
                description: "With a howl of wind, you tear open a portal large enough to fit yourself and one other
                    individual of your size. It lasts for only a split second, but you may use it to transport yourself and
                    an adjacent ally to a location anywhere within range. 
                    If you try to move to a spot you cannot see, you must make an Intelligence Check to determine 
                    how close you get to your target."
                range: 100
            -   name: Haste
                action_type: Offhand Action
                type: buff
                cost: 1
                duration: 3
                range: 60
                requirements:
                    movement: false 
                    verbal: true 
                    components: 
                        - A coffee bean
                description:  "Your voice rises in a quickening tempo as you urge your target forward."
                effect:
                    type: buff
                    description: "Blood pounds in their ears as they are filled with incredible energy. For the spell's duration, they are affected by the Hastened condition."
                    conditions:
                        - hastened
                    save: null 
        tier_3: # 2/2
            -   name: Winged Magic Steed # A tier
                action_type: Offhand Action
                type: summoning
                cost: 2
                duration: concentration
                requirements:
                    movement: true 
                    verbal: true
                description: "Raise your fingers to your mouth and whistle. Instantly, a winged steed appears, made of pure magical energy. The stallion
                    may be de-summoned on command and has 20 health."
                range: 30
                summoned_creature: 
                    all_tiers: Pegasus Mount
            -   name: Nothing but Unicorns # # B tier #Bard
                action_type: Action
                type: aoe damage
                cost: 3
                description: "Glitter dances as rainbows stream from you
                        in three lines, tangling into a stampede of unicorns!"
                duration: instantaneous
                range: 120
                requirements:
                    movement: true 
                    verbal: true
                damage_scaling:
                    damage_shape: line
                    damage_type: psychic
                    tier_3: "6d6"
                effect:
                    description: "Roll Inner Fire Resistance Check. 
                                    On success, they view you as a jet black unicorn 
                                    and the earth begins to sparkle and writhe. 
                                    They are Frightened of you and are Hindered."
                    conditions: 
                        - frightened
                        - hindered
                    type: debuff
                    save: "At the end of each of your turns, you must repeat your check."
-   name: Knight
    class_type: Tank
    recommended_stats:
        Charisma: 0
        Dexterity: -1
        Inner_Fire: 1
        Intelligence: -1
        Strength: 2
    handbook:
        -   title: Intro
            display_title: false 
            text: "Bulwark against evil. Knights stand tall on the front-line of an adventuring party.
                  All but unkillable, it is their duty
                  to protect their less resilient companions, standing in the way of blows that
                  would slay wizards and rogues where they stand. While many knights work for coin or
                  glory, others are called by a higher purpose. Such paladins can learn divine magic
                  and use it to heal their allies and burn their foes with radiant light. Whether
                  serving as bastion or healer, knights are a shield, holding their party together
                  and standing strong against any foe."
        -   title: When Adventuring
            display_title: true
            text:  "Knights are strong of body and spirit. Whether bending the bars of a prison
                        cell, charging through a locked door, or putting enemies in their place,
                        a knight's superior strength is of great use to their adventuring party.
                        When things look grim, a party's knight can be counted on to keep going,
                        no matter what. Vile curses, hazardous weather, and incredible fatigue
                        can do little to cause a knight to flag."
        -   title: "When Socializing"
            display_title: true 
            text:  "Many knights have a special affinity for speaking with other men-at-arms,
                        using the bond of battle to forge fast friendships. Gleaming plate can be
                        intimidating to the peasantry, though it tends to inspire awe rather than fear."
        -   title: "When in Combat"
            display_title: true 
            text: "A knight can be counted on to stand at the front line, using their abilities
                        to focus the attention of enemies and stop them from attacking a party's ranged
                        combatants and mages. Your role as a knight will be to defend
                        your party and to punish any enemy that would try to harm them."
    weapon_training:
        - Heavy Martial Weapons
        - Standard Martial Weapons
    starting_items:
        - Your choice of a common war hammer, shortsword, flail, or greatsword
        - A common shield
        - Your choice of chainmail (common moderate armor) or heavy plate (common heavy armor).
        - A tier appropriate minor healing potion
    health_schedule: 
        starting_health: 12
        standard_level_health_bonus: 2
        tier_increase_health_bonus: 6
    discoverable_abilities:
        tier_1:
            -   name: Shield Bash
                action_type: "Offhand Action"
                cost: 0
                type: debuff 
                duration: 1 
                range: "touch" 
                description: "Smash into an enemy with your Offhand and attempt to knock them off balance."
                damage_scaling:
                    damage_type: blunt 
                    all_tiers: "1d2"
                effect:
                    type: buff 
                    description: "Make a Strength Resistance Check. On success, they are Exposed to the next attack made against them."
                    conditions:
                        - exposed
                    save: null
            -   name: Phalanx
                action_type: "Offhand Action"
                cost: 0
                type: aoe buff 
                duration: infinite 
                range: self 
                radius: 15 
                description: "Adopt a defensive stance, granting all allies within five feet your protection."
                effect:
                    type: buff 
                    description: "While they stand at your side, your allies are considered to be Guarded."
                    conditions:
                        - guarded
                    save: null
            -   name: Goad
                action_type: "Offhand Action"
                cost: 0
                type: debuff
                range: 50
                duration: instantaneous
                description: "Call a challenge to an enemy."
                effect:
                    type: debuff
                    description: "Make a Charisma Resistance Check. On success, they become Fixated on you until the end of their next turn."
                    conditions:
                        - fixated 
                    save: null
            -   name: Pivot
                action_type: Offhand Action
                cost: 0
                type: combat option 
                duration: instantaneous
                range: self  
                radius: 10
                description: "As foes circle, place yourself between them and a nearby ally. Trade spaces with a willing creature within the ability's radius."
            -   name: Allied Strike
                action_type: Action
                type: combat option 
                cost: 1
                range: inherited
                duration: instantaneous
                ability_modified: standard attack 
                description: "As you strike your opponent, you batter away their defenses and deal bonus damage."
                effect:
                    type: debuff 
                    description: "If an ally attacks that opponent before the start of your next turn, they also deal bonus damage per this ability."
                    conditions:
                        - custom 
                    save: null 
                damage_scaling:
                    damage_type: inherited 
                    tier_1: 1d8
                    tier_2: 1d10
                    tier_3: 1d12          
        tier_2:
            -   name: Cleave
                action_type: Action
                type: combat option 
                cost: 1
                range: 10 
                duration: instantaneous
                ability_modified: standard_attack
                description: "Swing your weapon in a wide arc, targetting all enemies within the ability's radius."
                damage_scaling:
                    damage_type: inherited
                    damage_shape: cone
                    tier_1: 1d8
                    tier_2: 1d10
                    tier_3: 1d12
            -   name: Controlled Advance
                cost: 0
                type: buff
                duration: instantaneous
                range: self 
                action_type: Free Action
                ability_modified: slayed enemy
                description: "As a foe falls to your blade, use the oportunity to push into their ranks. 
                            Whenever you slay an enemy with a melee attack, you may step forward
                            into the space that they occupied. You are immune to exposed attacks 
                            during this movement. Once you've moved, you may make a standard attack."
            -   name: Overwhelming Strike
                action_type: "Action"               
                type: combat option
                cost: 1
                range: inherited
                duration: instantaneous
                ability_modified: standard attack
                damage_scaling:
                    damage_type: inherited
                    tier_1: "1d8"
                    tier_2: "1d10"
                    tier_3: "1d12"
                description: "With a blow like a hammerfall, you batter your enemy with a devestating attack."
                effect:
                    type: debuff 
                    description: "Make a Strength Resistance Check. On success, they are Staggered."
                    conditions: 
                        - staggered 
                    save: null    
            -   name: Make Space
                action_type: Action
                cost: 0
                type: combat option
                range: inherited
                duration: instantaneous
                ability_modified: standard attack
                description: "Slam into your enemy with oppressive force."
                effect:
                    type: debuff
                    description: "They must make a spell power saving throw. On failure, they are thrown back 15 feet.
                                If they strike something as a result, they are Staggered until the end of their next turn."
                    conditions: 
                        - staggered 
                    save: null
                damage_scaling:
                    damage_type: inherited 
                    tier_1: 1d8
                    tier_2: 1d10
                    tier_3: 1d12
        tier_3:
            -   name: Very Dangerous over Short Distances 
                action_type: "Passive"
                type: buff
                cost: 0
                range: touch
                duration: passive
                ability_modified: advantaged attack
                passive_damage_source: true
                description: "Once you've closed with an enemy, you are able to press the advantage."
                effect:
                    type: buff
                    description: "Roll damage at advantage if you begin your turn next to your target."
                    conditions: 
                        - custom 
                    save: null              
            -   name: Feint
                action_type: Offhand Action
                cost: 0
                type: combat option 
                duration: 1
                range: inherited
                description: "Take up a defensive position as enemies circle. The next enemy who attacks you does so at disadvantage.
                            You may immediately make a standard attack as a free action."
    abilities_by_level:
        level_1:
            -   name: Steel Yourself
                type: buff 
                cost: 1
                range: self 
                duration: instantaneous
                action_type: Free Action
                description: "Brace yourself against an attack. 
                            Make a Strength Resistance Check. On success, the attack does no damage. On failure, it deals half damage."
            -   name: Charge
                action_type: "Action"
                type: combat option
                cost: 1
                duration: instantaneous
                range: 25
                ability_modified: dash
                damage_scaling:
                    damage_type: blunt
                    tier_1: 1d8
                    tier_2: 1d10 
                    tier_3: 1d12 
                description: "With a mighty cry, you charge into the fray. 
                            Rush ahead 25ft. You are immune to exposed attacks and deal this ability's damage
                            to any enemy whose space you move through."
                effect:
                    type: debuff 
                    description: "Make an Inner Fire Resistance Check of any creature you hit. On success,
                                    they are knocked Prone."
                    conditions:
                        - prone 
                    save: null
            -   name: Inspiring Strike
                action_type: "Action"
                cost: 1
                type: combat option
                range: inherited
                duration: instantaneous
                action_type: modifies_ability 
                ability_modified: standard attack
                description: "The sight of you landing an incredible blow fills your allies
                            with determination."
                effect:
                    type: buff 
                    description: "Grant an ally you can see a inspiration."
                    conditions: 
                        - custom 
                    save: null
                damage_scaling:
                    damage_type: inherited
                    tier_1: "1d8"
                    tier_2: "1d10"
                    tier_3: "1d12"
        level_3:
            -   name: Shield Of Men
                type: combat option
                cost: 1
                range: 25
                duration: instantaneous
                action_type: Reaction
                description: "Leap in front of someone to become the target of an attack aimed at them. 
                                Any damage you receive as a result of this ability is halved."
        level_6:
            -   name: Lionhearted
                action_type: "Offhand Action"
                cost: 1
                type: aoe buff 
                range: self 
                radius: 30
                duration: 5
                description: "Your presence soothes your allies, inspiring them and guarding them against fear."
                effect:
                    type: buff 
                    description: "Grant all allies within the ability's radius inspiration. Furthermore, for the ability's duration, any friendly creatures within the ability's radius are immune to the Frightened condition."
                    conditions:
                        - fearless
                    save: null
        level_8:
            -   name: None Shall Pass
                type: debuff
                cost: 0
                range: inherited 
                duration: instantaneous
                action_type: modifies_ability
                ability_modified: exposed attack
                description: "You are a bulwark of steel, hindering any enemy advance."
                effect:
                    type: debuff 
                    description: "When you make an exposed attack, you may make a Strength Resistance Check. On success, they are Halted. On failure, they are Hindered."
                    conditions:
                        - halted 
                        - hindered 
                    save: null
        level_11:
            -   name: Move!
                action_type: Offhand Action
                type: aoe buff
                cost: 1
                duration: instantaneous
                range: self
                radius: 50
                description: "As you read the tide of the battle, call out a quick order to one of your allies."
                effect:
                    type: buff
                    description: "They are Spurred to Movement."
                    conditions:
                        - spurred to movement 
                    save: null
                upcast: "You may spend an additional action point on this spell to spur them to action, both take movement and and make one action or offhand action."
        level_13:
            -   name: Stay on Your Feet
                type: buff
                cost: 0
                range: self
                duration: passive
                action_type: Passive
                description: "Even battered and bloodied, you fight on.
                            If you fall to zero health, make a an Inner Fire Check with a target of 10. If you succeed, drop to 1 health instead."
        level_15:
            -   name: Aura of Hope
                action_type: "Passive"
                type: aoe buff
                cost: 0
                range: self 
                radius: 25
                duration: infinite
                description: "You have become the ultimate protector for your allies."
                effect:
                    type: buff 
                    description: "If an ally stands within the effect's radius, they may add +1 to all checks against 
                                enemy Threat and make death coin flips at advantage."
                    conditions:
                        - custom 
                    save: null
-   name: Barbarian
    class_type: Tank
    recommended_stats:
        Charisma: -1
        Dexterity: 0
        Inner_Fire: 1
        Intelligence: -1
        Strength: 2
    # expertise: "As a barbarian, you have expertise in raw feats of strength such as breaking the iron bars of a cell,
    #             bursting through a locked door, or rolling a heavy boulder. Barbarians also take expertise in intimidation."
    health_schedule: 
        starting_health: 12
        standard_level_health_bonus: 2
        tier_increase_health_bonus: 6
    handbook:
        -   title: "Intro"
            display_title: false
            text: "All muscle and rage, the Barbarian is a powerful frontline fighter. With their exceptional 
                    health and resileince, the Barbarian is able to shrug off blows that would level their allies.
                    Once a Barbarian closes with an enemy they deal massive damage, laying low anyone that dares stand in their way.
                    Out of combat, the Barbarian is among the strongest of the classes, and they use that strength 
                    to overcome their problems. The Barbarian's main weakness is their lack of arcane knowledge; 
                    for this reason, they are best backed up by a Bard, Cleric, or other support mage."
        -   title: "When Adventuring"
            display_title: true 
            text: "The Barbarian's great strength is vital while adventuring. Whether they are bursting through walls
                    or heaving great boulders, members of the Barbarian's party will stand on in awe as they use their strength 
                    to perform feats that look like magic."
        -   title: "When Socializing"
            display_title: true 
            text: "While many Barbarians are at home among ruffians and thieves, others are gentle giants.
                    Regardless, any Barbarian is able to use their demeanor to intimidate if necessary. 
                    When questioning someone, the party may deploy their Barbarian to learn the truth."
        -   title: "When in Combat"
            display_title: true 
            text: "Because of their strength and resilience, a party's Barbarian is usually found on the front line of combat.
                    They are expert at both offense and defense. As a Barbarian grows in strength, their abilities
                    layer atop one another, until even a normal attack deals massive damage. Barbarians are weak against
                    magical attacks, however, and need a solid back line to support them."
    weapon_training:
        - Heavy Martial Weapons
        - Standard Martial Weapons
    discoverable_abilities:
        tier_1:
            -   name: Brutal Attack
                action_type: Action
                type: combat option
                cost: 1
                range: inherited
                duration: instantaneous
                ability_modified: standard attack
                description: "Your muscles bulge and the earth shakes as you lash out at your enemy with a particularly vicious attack."
                effect:
                    type: debuff 
                    description: "Make a Strength Resistance Check. On success, they are knocked Prone."
                    conditions: 
                        - prone
                    save: null
                damage_scaling:
                    damage_type: inherited
                    tier_1: "1d8"
                    tier_2: "1d10"
                    tier_3: "1d12"
            -   name: Throw Caution to the Wind
                action_type: Free Action
                type: buff
                cost: 0
                range: self 
                duration: 1
                ability_modified: standard attack
                description: "Surge forward with reckless abandon, dealing bonus damage but leaving yourself exposed."
                effect: 
                    type: self-debuff
                    description: "At any time, you may declare that your attacks deal extra damage. 
                                However, when you make such an attack, you become Vulnerable until the start of your next turn."
                    conditions: 
                        - vulnerable
                    save: null
                passive_damage_source: true
                damage_scaling:
                    damage_type: inherited 
                    all_tiers: 1d4
            -   name: Guard-Break #Rework, redundant against knight's overwhelming strike
                action_type: Action
                type: combat option
                range: inherited
                duration: instantaneous
                ability_modified: standard attack
                cost: 1
                description: "Swing high and fast in an effort to knock your opponent off-balance."
                effect:
                    type: debuff 
                    description: "Make a strength check against their resistance. On sucess they are staggered."
                    conditions:
                        - staggered
                    save: null
                damage_scaling:
                    damage_type: inherited
                    tier_1: "1d8"
                    tier_2: "1d10"
                    tier_3: "1d12"
            -   name: Terrifying Damage
                type: buff
                cost: 0
                duration: passive 
                range: inherited
                action_type: modifies_ability 
                ability_modified: standard attack 
                passive_damage_source: true
                damage_scaling: 
                    damage_type: inherited
                    all_tiers: 1d6
                description: "You've learned to use your enemies' terror to your advantage. When you attack an enemy that is Frightened of you, deal bonus damage."
        tier_2:
            -   name: Every Wall is a Door
                action_type: Passive
                type: utility
                range: 15
                duration: 1
                cost: 1
                description: "Use your strength to blast through an obstacle that is one foot thick or less, to climb solid stone,
                            or to leap a treacherous gap. Move up to the ability's range unimpeded. You are still vulnerable to exposed attacks."
            -   name: The Closer
                type: buff
                cost: 0
                duration: passive 
                range: inherited 
                action_type: modifies_ability
                ability_modified: standard attack
                passive_damage_source: true
                damage_scaling: 
                    damage_type: inherited
                    all_tiers: 1d6
                description: "If you attack an enemy that is prone, deal bonus damage."
            -   name: Adrenaline
                type: buff
                cost: 0
                range: self
                duration: passive
                action_type: modifies_ability
                ability_modified: Berserk
                description: "A bloody grin spreads across your face as you hurtle towards your foes."
                effect:
                    type: buff 
                    description: "When you go berserk, you are Quickened."
                    conditions:
                        - quickened 
                    save: null
            -   name: Corner
                type: combat option
                cost: 1
                range: 15
                duration: instantaneous
                action_type: Reaction 
                description: "They won't get away that easy! If an enemy moves to pass you within 15 feet to either side,
                            you may spend a reaction to block them."
                effect:
                    type: debuff 
                    description: "If they are one size larger than you or smaller, they are immediately Halted. This ability does not work on flying targets."
                    conditions: 
                        - halted
                    save: null
            -   name: Relentless Rage
                action_type: Passive
                type: buff
                cost: 0
                range: self
                duration: passive
                action_type: modifies_ability
                ability_modified: Berserk
                description: "Blood thunders in your ears as you rage, blocking out attacks against your mind."
                effect:
                    type: buff 
                    description: "When you are going berserk, you are resistant to psychic damage and immune conditions which affect your state of mind."
                    conditions:
                        - resistant
                    save: null
        tier_3:
            -   name: A Little Terror
                action_type: Action
                type: debuff
                cost: 1
                range: 30 
                duration: 1
                description: "Use your intimidating presence to force an enemy to do your will."
                effect:
                    type: debuff 
                    description: "Make a Strength Resistance Check. On success, they are Controlled for one turn or must answer three of your questions truthfully."
                    conditions:
                        - controlled 
                    save: null
            -   name: Stay on Your Feet
                type: buff
                cost: 0
                range: self
                duration: passive
                action_type: Passive
                description: "Even battered and bloodied, you fight on.
                            If you fall to zero health, flip a coin. On heads, you fall to 1 health instead."  
            -   name: Blood for Blood
                action_type: Reaction
                type: combat option
                cost: 0
                range: self 
                duration: passive
                description: When you are going berserk and an enemy harms you, you may use your reaction to make a simple counterattack. The counter attack cannot use any of your other abilities.
            -   name: I cast 'Fist'
                action_type: Action
                cost: 1
                type: utility 
                range: self
                duration: 1
                description: "Your physical movements are so powerful that they warp the world around you. You are able to cast the equivalent
                            of simple magic as long as you can explain how the shear power of your movements are causing the effects to occur.
                            Follow the rules for informal magic, but always spend an action point."
    abilities_by_level:
        # For barbarian, replace blood for blood with Feint
        level_1:
            -   name: Berserk
                action_type: Offhand Action
                type: buff
                cost: 1
                range: self
                duration: 3
                type: buff
                description: "Rage threatens to consume you."
                effect:
                    type: buff
                    description: "For the ability's duration, you are Resistant to physical damage and have advantage on any strength check."
                    conditions:
                        - resistant
                    save: null
                upcast: "Optionally, you may choose to make Berserk last for ten minutes, however, when it ends you suffer one level of Exhaustion."
            -   name: Single Out
                action_type: Offhand Action
                type: debuff
                cost: 1
                range: 60
                duration: 10
                description: "Survey the battlefield for a foe worthy of your rage."
                effect: 
                    type: debuff 
                    description: "You gain 15ft of movement on any turn when you move towards them and your primary damage die increases by one step when you attack them hand-to-hand."
                    conditions: 
                        - custom 
                    save: null 
            -   name: Frightening Blow
                action_type: Action
                type: combat option
                cost: 1
                range: inherited
                duration: instantaneous
                ability_modified: standard attack
                description: "Spittle flies from your mouth as you strike at a foe."
                effect:
                    type: debuff 
                    description: "Make a Strength Resistance Check. On success, they are Frightened of you. 
                                    If they die as a result of a strike, choose a different target within 30ft. to become Frightened."
                    conditions: 
                        - frightened
                    save: null
                damage_scaling:
                    damage_type: inherited
                    tier_1: "1d8"
                    tier_2: "1d10"
                    tier_3: "1d12"
        level_3:
            -   name: Meat Shield
                type: combat option
                cost: 1
                range: touch 
                duration: instantaneous
                action_type: Reaction
                description: "When you see an incoming attack, you may attempt to shield yourself with an adjacent enemy." 
                effect:
                    type: debuff 
                    description: "Make a Strength Resistance Check. On success, they take the damage instead of you."
                    conditions:
                        - custom 
                    save: null
        level_6:
            -   name: Terrify
                type: debuff
                cost: 0
                range: inherited
                duration: save
                action_type: modifies_ability
                ability_modified: Single Out
                description: "As the enemy you've singled out looks up at your dark, rage-filled eyes, their constitution shakes."
                effect:
                    type: debuff 
                    description: Make a Strength Resistance Check. On success, they become Frightened of you until the end of their next turn.
                    conditions: 
                        - frightened 
                    save: null
        level_8:
            -   name: Throw Anything
                type: buff
                cost: 0
                range: inherited 
                duration: passive
                range: 30
                action_type: modifies_ability
                ability_modified: thrown attack
                description: "Sometimes, you can't get close enough to punch. You are able to treat any object you throw as a regular weapon
                            with a thrown range of 30ft. Additionally, if you use
                            the Meat Shield ability and the target dies, you may immediately make an attack using them as a thrown weapon."                                  
        level_11:
            -   name: Resistant Rage
                action_type: modifies_ability
                ability_modified: Berserk
                type: buff
                cost: 0
                range: inherited
                duration: inherited
                type: buff
                description: "Your rage is so complete that you can shield yourself against enemy abilities."
                effect:
                    type: buff
                    description: "While going Berserk, roll any checks against an enemy's Threat with advantage."
                    conditions:
                        - custom
                    save: null
        level_13:
            -   name: The Opener
                action_type: Passive
                type: buff
                cost: 0
                range: self
                duration: passive
                action_type: modifies_ability
                ability_modified: Brutal Attack
                description: "The chance of violence spurs you forward."
                effect:
                    type: buff 
                    description:  "On the first turn of combat, you are 
                            Quickened. Additionally, if you attack an enemy that has not yet taken a turn, use a 1AP attack at no cost."
                    conditions:
                        - quickened
                    save: null   
        level_15:
            -   name: You're Next!
                type: buff
                cost: 0
                duration: passive 
                range: inherited
                action_type: modifies_ability 
                ability_modified: Singled Out 
                description: "If you slay your Singled Out target, you may immediately move 25ft and make a standard attack."
                effect:
                    type: buff 
                    description:  "If your target survives, they are Frightened of you until the end of their next turn."
                    conditions:
                        - frightened
                    save: null
-   name: Rogue
    class_type: Striker
    recommended_stats:
        Charisma: 1
        Dexterity: 2
        Inner_Fire: -1
        Intelligence: 0
        Strength: -1
    handbook:
        -   title: Intro
            display_title: false 
            text: "Knives in the dark, rogues are famously stealthy and perceptive. They blend into crowds
                 like shadow, gathering information or relieving a mark of their life or possessions.
                 Rogues have little health, and as such, it can be disastrous if they are struck by an
                 enemy attack. Thankfully, their stealth and abilities make them among the most slippery
                 of combatants. While others tackle their challenges head on, rogues wait to find 
                 openings—when life gives you a guarded door, a rogue is the first to go in through a window."
        -   title: "When Adventuring"
            display_title: true 
            text: "Incredibly dexterous, rogues are skilled at mantling buildings, lurking in the shadows,
                        disarming traps and picking locks. As a rogue, you will often go in first to make
                        certain the way is safe, using your abilities to clear a path for the 
                        less-nimble members of your adventuring party."
        -   title: "When Socializing"
            display_title: true
            text: "While some rogues stand back silently, others are charming and deceptive. With their
                    nimble fingers, rogues are skilled at pocketing items that aren't theirs, though the
                    wise rogue won't target their party with such exploits."
        -   title: "When in Combat"
            display_title: true 
            text: "Rogues have low health but deal heavy damage to their foes. In combat, they spend
                    much of their time skirting the edges of the fray, looking for opportunities to dash in, land
                    a critical blow, and then disappear into the shadows. Rogues are adept at fighting
                    with daggers, hurling them at opponents and slashing multiple times to deal quick,
                    repeated damage. If a rogue invests in magic, they can use their abilities to avoid
                    damage by becoming invisible, fill an area with shadows, or even launch themselves high into the air."
    #expertise: "As a rogue, you have expertise in all dexterity checks and saves. This includes checks made to climb, sneak, hide, pickpocket, pick locks."
    weapon_training:
        - Light Martial Weapons
        - Light Ranged Weapons
    starting_items:
        - Your choice of two common daggers or a rapier and buckler
        - Your choice of a shortbow or a hand crossbow
        - A leather jerkin (common light armor)
        - A salve
        - A traveling cloak
    health_schedule: 
        starting_health: 6
        standard_level_health_bonus: 2
        tier_increase_health_bonus: 4
    discoverable_abilities:
        tier_1:
            -   name: Dart In
                action_type: Passive
                type: buff
                cost: 0
                duration: instantaneous
                range: dash
                ability_modified: dash
                description: "When you use your Action to dash, you may end the movement with a melee attack."
            -   name: Shared Stealth
                action_type: "Free Action"
                type: aoe buff 
                cost: 1
                duration: 1 hour 
                range: self 
                radius: 30 
                description: "Your stealth is so great that you are able to make up for your parties' shortcomings." 
                effect:
                    type: debuff
                    description: "For the next hour, add your proficiency to any friendly stealth rolls made within the ability's radius.
                                If a party member already benefits from proficiency on stealth rolls, they may instead add an additional +1."
                    conditions: 
                        - custom 
                    save: null
        
        tier_2:
            -   name: Throw Caution to the Wind
                action_type: Free Action
                type: buff
                cost: 0
                range: self 
                duration: 1
                ability_modified: standard attack
                description: "Surge forward with reckless abandon, dealing bonus damage but leaving yourself exposed."
                effect: 
                    type: self-debuff
                    description: "At any time, you may declare that your attacks deal extra damage. 
                                However, when you make such an attack, you become Vulnerable until the start of your next turn."
                    conditions: 
                        - vulnerable
                    save: null
                passive_damage_source: true
                damage_scaling:
                    damage_type: inherited 
                    all_tiers: 1d4
        tier_3:
            -   name: Slip Away
                action_type: "modifies_ability"
                ability_modified: "Standard Attack"
                cost: 0
                type: buff
                ability_modified: standard attack 
                range: self 
                duration: passive
                description: "You are able to streak in, harm a foe, and then retreat again."
                effect:
                    type: debuff
                    description: "Whenever you strike an enemy, you are considered Elusive to them until the end of your turn."
                    conditions:
                        - elusive 
                    save: null
    abilities_by_level: 
        level_1:
            -   name: Thief's Strike
                action_type: "Action"
                type: combat option 
                cost: 1
                range: inherited
                duration: 1
                ability_modified: martial attack 
                description: "As you stab an enemy with one hand you rob them blind with the other."
                effect:
                    type: debuff 
                    description: "Make a Dexterity Resistance Check. On success, you are able to steal one object from them.
                                If your attack is ranged, you may instead declare that an object is knocked free of their grasp."
                    conditions:
                        - custom 
                    save: null
                damage_scaling: 
                    damage_type: inherited
                    tier_1: 1d8
                    tier_2: 1d10
                    tier_3: 1d12
            -   name: Dodge
                action_type: Free Action
                cost: 1
                range: self 
                duration: instantaneous
                type: combat option
                action_type: Free Action
                description: "Attempt to pivot out of the way and avoid an incoming attack."
                effect:
                    type: buff 
                    description: "Make a Dexterity Resistance Check. On success, the attack misses. On failure, it deals half damage."
                    conditions:
                        - custom
                    save: null
                upcast: You may spend an additional action point to continue dodging until the start of your next turn.
            -   name: Creep
                action_type: "Offhand Action"
                cost: 1
                type: buff 
                range: self 
                duration: 1
                description: "Focus your attention to vanish into the shadows. You gain advantage on checks made to hide or sneak for the next 3 rooms or until you make an attack."
        level_3:
            -   name: Strike From The Shadows
                action_type: "modifies_ability"
                cost: 0
                type: buff
                duration: passive 
                range: inherited 
                ability_modified: attack from hiding 
                description: "Streak in and strike when an enemy is distracted. You deal bonus damage when you attack from hiding or when an enemy is Harried."
                passive_damage_source: true 
                damage_scaling:
                    damage_type: inherited
                    all_tiers: 1d4
        level_6:     
            -   name: Opening Strike
                action_type: "Offhand Action"
                cost: 0
                type: debuff
                duration: instantaneous
                range: 30
                description: "Hurl a dagger or fire a shot at your foe as you rush at them."
                damage_scaling:
                    damage_type: piercing
                    all_tiers: "1d2"
                effect:
                    type: buff
                    description: "Make a Dexterity Resistance Check. On success, they are Exposed to your next attack on this turn.
                                This ability cannot be used if you begin adjacent to your target."
                    conditions:
                        - exposed
                    save: null
        level_8:
            -   name: Weakening Blow
                action_type: "Action"
                cost: 1
                type: combat option
                range: inherited 
                duration: instantaneous
                ability_modified: standard attack
                description: "As you land a particularly well placed blow, you slice into your opponent's vitals and sap their strength."
                effect: 
                    type: debuff
                    description: "Make a Dexterity Resistance Check. On success, their next attack is Weakened."
                    conditions:
                        - weakened 
                    save: null
                damage_scaling:
                    damage_type: inherited
                    tier_1: "1d8"
                    tier_2: "1d10"
                    tier_3: "1d12"
        level_11:
            -   name: Evasion
                action_type: "Passive"
                cost: 0
                range: self 
                duration: passive 
                type: buff
                description: "Use your uncanny knack for survival to avoid an explosion or other area of effect attack."
                effect: 
                    type: buff
                    description: "When an area of effect attack calls for you to make a check against an enemy's Threat, 
                                you take half damage on a failure or no damage on a success."
                    conditions: 
                        - custom 
                    save: null    
        level_13:
            -   name: Ride The Blindspot
                action_type: "Reaction"
                cost: 1
                type: buff 
                range: self 
                duration: instantaneous
                description: "You have learned to stay behind an enemy, even if they try to turn on you."
                effect:
                    type: buff 
                    description: "If you are standing behind an enemy and they try round on you, you may spend an action point to 
                                pivot around them as a reaction. If they try to move, you may move with them.
                                Ride the Blindspot continues until the end of the enemy's
                                turn."
                    conditions: 
                        - custom 
                    save: null
        level_15:
            -   name: Incredible Reflexes
                action_type: "Passive"
                cost: 0
                type: buff 
                range: self 
                duration: 1
                description: "As combat is joined, you burst into action. On the first round of combat, you are able to take two turns."
-   name: Ranger
    class_type: Striker
    recommended_stats:
        Charisma: -1
        Dexterity: 2
        Inner_Fire: 0
        Intelligence: 1
        Strength: -1
    health_schedule: 
        starting_health: 8
        standard_level_health_bonus: 2
        tier_increase_health_bonus: 4
    handbook:
        -   title: Intro
            display_title: false 
            text: "Protectors of natural order, Rangers are masters of traversing the wilderness. 
                   Tales of Rangers are sung in the borderlands, where the wilds crash 
                   against civilization. Rangers silently push back against the chaos of the wilds, 
                   protecting unwitting villagers from abberations, fiends, and wild things. 
                   Rangers rarely stay in one place, and the area under their protection can span for hundreds of miles.
                   This means that their relationships are few and transient, though some take an animal companion or
                   find friendship with a local druid or wizard. Rangers are often among the first to realize 
                   when something sinister is brewing. When they end up in an adventuring party, it is usually 
                   because something has threatened the natural order and they believe that they can help restore it."
        -   title: "When Adventuring"
            display_title: true 
            text: "Rangers are invaluable when traversing the wilderness, using their high Intelligence and Dexterity
                    to lead the way through trecherous climbs. Rangers are expert at piecing tracking foes and 
                    piecing together what happened from even the faintest sign."                    
        -   title: "When Socializing"
            display_title: true 
            text: "While rangers have a reputation as brooding figures found in the corner of the local tavern, they 
                     command great respect from the citizens of border towns. A ranger's word carries weight, and even the 
                     few question their expertise when it comes to monsters or monster-hunting."
        -   title: "When in Combat"
            display_title: true 
            text: "Rangers are intelligent combatants who fight with precision and care. Their Analyze ability 
                    allows them to learn their enemy before striking, dealing extra damage and finding ways to slip through their defenses.
                    Some rangers choose to master the blade, while others keep a distance, choosing the Path of the Hunter and wielding the bow.
                    Regardless, Rangers are fierce combatants who excel at targetting and slaying individual foes."    
    weapon_training:
        - Light Ranged Weapons
        - Heavy Ranged Weapons
    discoverable_abilities:
        tier_1:
            -   name: Grappler's Line
                action_type: Action
                cost: 1
                type: combat option 
                range: inherited 
                duration: instantaneous
                description: "Affix a cord to your arrow and fire it at a target. As it hits, it holds fast, creating a durable link between you."
                effect:
                    type: debuff 
                    description: "If your target is a living creature, make a Dexterity Resistance Check. On success, they become Tethered to you."
                    conditions:
                        - tethered 
                    save: null
                damage_scaling:
                    damage_type: inherited 
                    tier_1: 1d8
                    tier_2: 1d10
                    tier_3: 1d12   
            -   name: Focus
                action_type: Offhand Action
                cost: 0
                type: buff
                passive_damage_source: true
                duration: 1
                range: self 
                ability_modified: next attack 
                description: "Carefully line up your next shot."
                effect:
                    type: buff 
                    description: "When you attack on this turn you may double your weapon's effective range, ignore partial cover, and roll damage at advantage."
                    conditions:
                        - custom 
                    save: null            
            -   name: Follow Up
                action_type: Passive
                cost: 0
                type: buff
                passive_damage_source: true
                range: inherited 
                duration: passive 
                ability_modified: standard attack
                description: "Blow after blow, you wear your target down. If you attack an enemy,
                            subsequent attacks deal extra damage if you don't choose another target.
                            Extra damage starts at 1d4 and grows with each hit, capping at 1d8."
        tier_2:
            -   name: Strider
                action_type: Passive
                type: buff
                cost: 0
                duration: passive
                range: self
                description: "Your base movement is increased by 10ft."
                effect:
                    type: buff
                    description: "Additionally, difficult terrain no longer hinders you. When out of combat, 
                                take advantage on dexterity checks made to navigate natural obstacles."
                    conditions:
                        - custom 
                    save: null
        tier_3:
            []
    abilities_by_level:
        level_1:
            -   name: Analyze
                action_type: Offhand Action
                type: combat option
                cost: 0
                duration: 1 hour
                range: 30
                description: "Spend a moment watching an enemy or make an Intelligence Check when you find tracks or sign of a creature's passing. 
                                Learn one fact of your choice about the creature, for example, what type of creature it was or its Resistance is."
                effect:
                    type: debuff 
                    description: "For the ability's duration roll Threat Checks, Resistance Checks, and Called Shots against the creature at advantage.
                                When out of combat, take advantage on tracking checks made to follow or detect the analyzed creatures."
                    conditions:
                        - custom 
                    save: null
            -   name: Pin Down
                action_type: Action
                type: combat option 
                cost: 1
                range: inherited
                duration: instantaneous
                ability_modified: standard attack 
                description: "You aim a carefully placed attack in order to slow your target's advance."
                effect:
                    type: debuff 
                    description: "Make a Dexterity Resistance Check. On success, they are Hindered."
                    conditions:
                        - hindered 
                    save: null 
                damage_scaling:
                    damage_type: inherited 
                    tier_1: 1d8
                    tier_2: 1d10
                    tier_3: 1d12
            -   name: Fade Step
                action_type: Offhand Action
                cost: 1
                type: buff
                range: self
                duration: instantaneous
                description: "You reposition with practiced footwork."
                effect:
                    type: buff
                    description: "Move up to 15ft without provoking exposed attacks. This movement ignores difficult terrain and may carry you through enemy spaces without provoking an exposed attack."
                    conditions: 
                        - custom
                    save: null 
        level_3:
            -   name: Decoy
                action_type: Offhand Action
                type: combat option 
                cost: 1
                range: 60
                duration: instantaneous
                ability_modified: standard attack 
                description: "From hiding, cup your hands and make a perfect monster call."
                effect:
                    type: debuff 
                    description: "Make an Intelligence Resistance Check. On success, your target is Lured to a point of your choosing. Intelligent creatures may 
                                  ignore the luring, but are instead Stunned on their next turn."
                    conditions:
                        - lured 
                        - stunned
                    save: null 
        level_6:
            -   name: Piercing Attack
                action_type: Action
                cost: 1 
                type: buff 
                range: self 
                duration: instantaneous
                ability_modified: standard attack 
                description: "You find exactly the right angle to fire a shot which pierces your enemies."
                effect:
                    type: buff
                    description: "The attack passes through all enemies in a line before you, dealing damage to each."
                    conditions:
                        - custom 
                    save: null
        level_8:
            -   name: Covering Fire
                action_type: Offhand Action
                type: combat option
                range: 60
                duration: 1
                cost: 1 
                description: "As the final action on your turn, lay down covering fire across a 15x60ft line before you."
                effect:
                    type: debuff
                    description: "Until the start of your next turn, the area is considered difficult terrain and enemies who move through or begin their turn within 
                                  it take damage."
                    save: null 
                    conditions: 
                        - hindered
                damage_scaling: 
                    damage_type: inherited
                    damage_shape: line
                    scaled_by:
                        weapon: false
                    all_tiers: "1d4"
        level_11:
            -   name: Guard-Break
                action_type: Action
                type: combat option
                range: inherited
                duration: instantaneous
                ability_modified: standard attack
                cost: 1
                description: "Make a carefully aimed attack meant to batter away an enemy's defenses."
                effect:
                    type: debuff 
                    description: "Make a Dexterity Resistance Check. On success, your target is Exposed until the end of your next turn."
                    conditions:
                        - exposed
                    save: null
                damage_scaling:
                    damage_type: inherited
                    tier_1: "1d8"
                    tier_2: "1d10"
                    tier_3: "1d12"
        level_13:
            -   name: Nimble
                action_type: Passive
                type: buff
                cost: 0
                duration: passive
                range: self
                description: "Your perception is so advanced that you are able to avoid arrows and other ranged attacks."
                effect:
                    type: buff
                    description: "You are permanently considered to be Guarded against targeted ranged attacks."
                    conditions:
                        - guarded 
                    save: null
        level_15:
            -   name: Volley
                action_type: "Action"
                type: aoe damage
                cost: 2
                duration: instantaneous
                range: 100
                radius: 15
                description: "Fire arrow after arrow in a volley of arching shots. They rain down on enemies in an area of your choosing."
                damage_scaling:
                    damage_type: piercing
                    all_tiers: 6d4 #(2d12 (13) vs 15)       
-   name: Cleric
    class_type: Support
    health_schedule: 
        starting_health: 6
        standard_level_health_bonus: 2
        tier_increase_health_bonus: 2
    recommended_stats:
        Charisma: 1
        Dexterity: -1
        Inner_Fire: 2
        Intelligence: 0
        Strength: -1
    handbook:
        -   title: Intro
            display_title: false
            text: "Servant of the divine. A cleric has given themselves over to the worship of a deity or deities. For some, 
                this means a life spent in a temple, while for others, it means wandering the realms and preaching the good word.
                As an adventurer, your deity has chosen you for something special and has granted you the power to carry out their will.
                Clerics are practitioners of divine magic, and are known for their ability to bring healing to the sick and dying."
        -   title: When Adventuring
            display_title: true
            text:  "Clerics use divine magic to overcome their problems. When adventuring you may call back the soul of a departed 
                      person for questioning, bind an enemy in place, or project yourself across the realms to aid 
                      a distant ally. Unlike most other classes, the cleric always has someone in their corner. As they reach higher levels,
                      a Cleric's deity or their servants may reach out, giving guidance and providing marching orders."
        -   title: When Socializing
            display_title: true 
            text: "Clerics are welcome most everywhere, and it is not out of the ordinary for commonfolk to approach them for 
                      blessings or healing. Temples can be found scattered throughout the realms, and can serve as a friendly place 
                      for practitioners a given faith. Indeed, the only people who generally dislike clerics are those of competing faiths,
                      or followers of dark gods in opposition to a cleric's deity."
        -   title: When in Combat
            display_title: true 
            text: "Clerics often take a supporting role in combat, granting powerful boons to their allies and weakening their enemies.
                 Healing magic is at the core of a cleric's arsenal; when a party's barbarian launches themselves headlong into a horde 
                 of skeletons, it is often the cleric that keeps them standing long enough to emerge victorious. Clerics are not without
                 the ability to fight, however. With beams of scouring light, they are able to blind their foes and push them back into the 
                 darkness."
    weapon_training:
        - Focuses
    starting_items:
        - A common arcane amulet or conjurer's idol 
        - Your choice of a heavy padded robe (common light armor) or leather jerkin (common light armor)
        - A salve 
        - A set of cleric's clothing
    #expertise: "As a cleric, you take expertise in intelligence checks. This includes any checks made to perform informal magic."
    discoverable_abilities:
        tier_1:
            -   name: Enlarge
                action_type: "Offhand Action"
                type: buff
                cost: 1
                duration: 3
                range: 30
                requirements:
                    movement: true 
                    verbal: true
                description: "As you grasp your holy symbol, glowing energy suffuses a creature of your choosing."
                effect: 
                    type: buff
                    description: "At once, their body is Enlarged."
                    conditions:
                        - enlarged
                    save: null
            -   name: Speak with the Dead
                action_type: "Offhand Action"
                type: utility
                cost: 1
                range: touch
                duration: 5 
                requirements:
                    verbal: true 
                    movement: true 
                    components:
                        - A candle
                        - Holy oil (1gp)
                description: "Anoint a body with holy oil and clutch a candle close.
                            As you reach out to your deity, the candle flares as the 
                            deceased's spirit returns to the mortal coil.
                            The corpse cannot move, but is able to communicate so long as it's mouth and ears are present.
                            You may ask it three questions before the spell ends and the flame goes out. 
                            This spell may be cast
                            on a given creature exactly once."
                upcast: You may spend an additional action point to ask an additional two questions of the corpse.
            -   name: Leap of Faith
                action_type: "Offhand Action"
                type: utility
                cost: 1
                duration: concentration
                range: self
                requirements:
                    verbal: false 
                    movement: false 
                description: "Look skyward and put your faith in your deity. As you step out onto a surface that will not hold you,
                            it is instead solid and safe. In this way you can walk atop water, molten earth, or even across 
                            thin air. This spell continues until you lose concentration or until you have moved 60ft."
            -   name: Pacify # Cleric
                action_type: "Reaction"
                type: debuff
                cost: 1
                duration: instantaneous
                range: self
                requirements:
                    movement: true 
                    verbal: true
                description: "As an enemy attempts to harm you with a targeted attack, call out to your deity for aid."
                effect:
                    type: debuff 
                    description: "Make an Inner Fire Resistance Check. On success, the attack misses. On failure, it deals half damage."
                    conditions:
                        - custom
                    save: null
            -   name: Holy Light
                action_type: "Offhand Action"
                type: aoe debuff
                cost: 1
                duration: concentration
                range: touch
                radius: 50
                requirements:
                    movement: true 
                    verbal: true
                description: "With a muttered prayer, you raise an object aloft and it illuminates with the intensity of a torch."
                effect:
                    type: debuff
                    description: "Undead and demonic creatures who begin their turn within the light are Staggered."
                    conditions: 
                        - staggered
                    save: null
        tier_2:
            -   name: Sphere of Encasement
                action_type: "Action"
                type: utility
                cost: 2
                range: 60
                duration: concentration
                requirements:
                    verbal: true 
                    movement: true
                    components:
                        - A piece of polished quartz
                description: "Hold a piece of quarts to your eye and view a creature through it. At once, an orb 
                            of magical energy forms around them with 50 hit points. Nothing may pass through the orb, 
                            though it always has enough oxygen for the creature within. The creature inside
                            can push the orb to cause it to rotate, moving a distance up to half its movement on its turn."
            -   name: Scry # B tier Wizard spell
                action_type: "Offhand Action"
                type: utility
                cost: 1
                range: infinite
                duration: concentration
                requirements:
                    verbal: true
                    movement: true 
                    components:
                        - A reflective surface 
                        - A clear focusing gem
                description: "You press a focusing gem against a reflective surface and speak the 
                    primordial word for 'reveal,' allowing you to view and hear
                    a person or place you've seen as if through a one way window. The spell cannot
                    penetrate lead or protective spells. Upon casting, you may alert your target. They may spend an action point to
                    tether the spell to a nearby reflective surface if they are a mage."
                upcast: "If you target an unwilling creature, you must make an Inner Fire Resistance Check. On failure, they know that someone tried to view them." 
            -   name: Town Portal
                action_type: "Ritual"
                type: utility
                cost: 2
                duration: instantaneous
                range: touch
                casting_time: 10 minutes
                requirements:
                    movement: true
                    verbal: true
                    components:
                        - Blessed chalk
                description: "When you enter a town, you may pray over a dwelling and draw a holy glyph on the doorframe. From that point forward, 
                    you may perform a ritual to open a door to that location, regardless of distance. You may mark at most one building per town
                    in this way."
            -   name: Truesight
                action_type: "Offhand Action"
                type: buff
                cost: 1
                range: touch
                duration: 1 hour
                requirements:
                    verbal: true
                    movement: true
                description: "Your eyes shimmer with holy light as you speak a prayer for clarity."
                effect:
                    type: buff
                    description: "By the power of your deity, grant yourself Trusight."
                    conditions:
                        - truesight
                    save: null
            -   name: M&M's Beckoning Call # More of a bard spell
                action_type: "Offhand Action"
                type: utility
                cost: 2
                requirements:
                    movement: true 
                    verbal: true 
                    components:
                        - A stick
                duration: 1 day
                range: touch
                description: "Lay your hands on a willing creature and imbue them with magic of recall.
                            One time over the spell's duration, you are able to instantly teleport them to a space 
                            adjacent to you, regardless of distance. This teleportation has the same restrictions as
                            any other, may be blocked by certain spells or abilities, and is performed as a Free Action."
        tier_3:
            -   name: Resurrection
                action_type: "Ritual"
                type: utility
                cost: 3
                range: touch 
                duration: instantaneous
                casting_time: 6 hours
                requirements:
                    movement: true
                    verbal: true
                    components: 
                        - Rare holy oil and incense (500gp)
                        - A soul gem (1000gp)
                description: "Lay out the body of someone who has died within the past week. Spend time 
                            anointing them with oil, burning incense, and using your magic to mend
                            their body. Lay a soul gem on their chest and ask your deity for their strength. 
                            Make an Inner Fire Check. On full or partial success, reclaim the target's soul 
                            and return them to life. On full or partial failure, they may not be resurrected 
                            as determined by the Grand Poohbah."
                upcast: "If someone who loved the deceased dearly helps you, they may spend one action point 
                        to to grant you advantage on your check."
            -   name: Avatar
                action_type: "Ritual"
                type: utility
                cost: 3
                range: infinite 
                duration: concentration 
                casting_time: 10 minutes
                requirements: 
                    movement: false 
                    verbal: false 
                    components:
                        - Rare Holy Insense (1000gp)
                description: "Close your eyes and empty your mind. By the will of your diety, project your conciousness across the void. 
                            A faintly glowing copy of you appears somewhere in the Realms at a location of your choosing. You 
                            control the copy as though it is you. The copy has full health and action points, and knows your abilities. 
                            It persists until your real body loses concentration on it, or until it falls to zero health and disappears."
            -   name: Mantle of Dawn
                action_type: "Offhand Action"
                type: aoe buff
                cost: 2
                requirements:
                    movement: false
                    verbal: true
                duration: concentration
                range: self
                radius: 30
                description: "A halo blazes about your head, shedding radiant light in a radius around you."
                effect:
                    type: buff
                    description: "For the spell's duration, all enemies within the radius are Weakened. At the spell's start, all allies in the radius gain inspiration."
                    conditions:
                        - custom
                        - diminished
                    save: null  
    spells:
        tier_1: # 10 / 10
            -   name: Beam of Light # Cleric
                action_type: "Action"
                type: damage
                cost: 0
                duration: instantaneous
                range: 60
                description: "A blinding beam of radiance streaks from your holy symbol towards your target."
                effect: 
                    type: debuff
                    description: "If you roll max damage on any of the dice for this attack, your target is Blinded until the end of their next turn."
                    conditions:
                        - blinded
                    save: null
                requirements:
                    movement: true 
                    verbal: true
                damage_scaling: 
                    damage_type: "radiant"
                    tier_1: 1d6 #(3.5 + 3.5f = 7)
                    tier_2: 1d8 #(7 + 7f = 14)
                    tier_3: 1d10 #(10.5 + 10.5f = 21)
                upcast: "For each additional action point spent on this spell, deal an additional dice of damage."
            -   name: Ward of Protection # After damage, heal? Or maybe when attacked, cleric rolls?
                action_type: "Offhand Action"
                type: buff
                cost: 1
                duration: 3
                range: touch
                requirements:
                    movement: true 
                    verbal: true
                description: "Pray over one of your allies, beseeching your deity to protect them from harm."
                effect: 
                    description: "For the spell's duration, they are considered Guarded against all damage."
                    type: buff
                    conditions:
                        - guarded
                    save: null
            -   name: Prayer of Healing
                action_type: "Offhand Action"
                type: healing
                cost: 1
                duration: instantaneous
                range: 30
                requirements:
                    movement: true 
                    verbal: true
                description: "As you channel the power of your deity, waves of healing knit your target's wounds shut.
                    If you physically touch your target, double the number of dice rolled."
                damage_scaling: 
                    damage_type: healing
                    tier_1: 1d4
                    tier_2: 1d8
                    tier_3: 2d8
            -   name: Bind # On failure slow
                action_type: "Action"
                type: debuff
                cost: 1
                range: 30
                duration: concentration
                requirements:
                    verbal: false
                    movement: true
                description: "Lift your hand to stop an encroaching enemy."
                effect:
                    type: debuff 
                    description: "Make an Inner Fire Resistance Check. On success, they are Incapacitated."
                    conditions:
                        - incapacitated
                    save: "As an action, your target may force you to remake your check."
                upcast: "For each additional action point spent on this spell, you may attempt to bind two more creatures."
            -   name: Mend
                action_type: "Offhand Action"
                type: utility
                cost: 0
                duration: instantaneous
                range: touch
                requirements:
                    movement: true 
                    verbal: true
                description: "Your hands glow as you magically mend small dents, dings, scratches, and tears on an item you are touching. 
                                You may also use this spell to render poisons innocuous, to
                                    heal minor status effects such as drunkenness, or to convert water to holy water at a rate of one gallon per hour."
                upcast: "You may spend an action point on this spell to increase it's power, mending larger items such as broken walls, wheels, or armor. In a similar manner, 
                            you may spend an action point to remove a status effect from an ally or to render a curse innocuous for one day."
        tier_2: # 10 / 10
            -   name: Guardian Blade
                action_type: "Action"
                type: damage
                cost: 1
                duration: concentration
                range: 15
                requirements:
                    movement: true 
                    verbal: true
                description: "In a burst of golden sparks, a holy weapon appears to float in the air beside you. On your turn, you may use an Offhand Action to move the blade up to thirty feet
                    and attack with it.
                    The blade must remain within one hundred feet of you or be de-summoned."
                damage_scaling:
                    damage_type: radiant
                    tier_2: 1d8 
                    tier_3: 1d10
            -   name: Excoriating Beam # Cleric
                action_type: "Action"
                type: aoe damage
                cost: 1
                duration: instantaneous
                range: 100
                requirements: 
                    movement: true 
                    verbal: true
                description: "A blinding beam of light streaks forth, ringed with halos. The blast 
                                harms everyone in a line before you, but is stopped by inanimate objects with a 
                                width greater than one foot."
                effect:
                    type: debuff
                    description: "For any target hit by the beam, make an Inner Fire Resistance Check. On success, they are Blinded until the end of their next turn."
                    save: null
                    conditions: 
                        - blinded
                damage_scaling:
                    damage_shape: "line"
                    damage_type: radiant
                    tier_2: 1d8 #(10.5 + 7f + 4inf x 2 = 21.5 each x2 = 43 total)
                    tier_3: 1d10 #(14 + 10.5f + 5inf x 2 = 29.5 each x2 = 59 total)
            -   name: Fiery Rebuke # Cleric
                action_type: "Action"
                type: aoe damage
                cost: 1
                duration: instantaneous
                range: self
                requirements:
                    movement: true 
                    verbal: true
                description: "White hot flames fill the space around you as you call on your deity for protection. They deal damage to everyone in the spell's radius."
                damage_scaling: 
                    damage_type: radiant
                    tier_1: "1d8"
                    tier_2: "1d10"
                    tier_3: "1d12"
                radius: 15
                upcast: "For each additional action point spent on this spell, increase its radius by 10 feet."
            -   name: Mass Heal
                action_type: "Offhand Action"
                type: aoe healing
                cost: 2
                range: self 
                duration: instantaneous
                radius: 15
                requirements:
                    verbal: true 
                    movement: false 
                description: "Hands clasped, you pray for the health of all those around you. Glowing golden light
                            wraps any allies within the spell's radius as they are healed."
                damage_scaling: 
                    damage_type: healing
                    tier_2: 2d4
                    tier_3: 3d4
                upcast: For each additional action point spent on this spell, increase its radius by 15ft and add an additional dice.
            -   name: Dispel Magic
                action_type: "Offhand Action"
                type: utility
                cost: 1
                duration: 1
                range: touch
                requirements:
                    verbal: true 
                    movement: false
                description: "Carefully undo the weave of a first tier spell or curse. If the magic that you seek to 
                            reverse is of a higher tier, the Grand Poohbah will ask you to make an Intelligence Check.
                            Dispel magic does not heal damage or repair magically damaged objects."
        tier_3: # 5/5
            -   name: Pillar of Dawn # Cleric
                action_type: "Action"
                type: aoe damage
                cost: 3
                range: 1 mile
                duration: instantaneous
                radius: 25
                requirements: 
                    verbal: true 
                    movement: true 
                description: "Spread your hands wide as you summon forth the glory of your deity. A pillar of fire falls
                            from the heavens and envelops a radius of your choosing. The fire crackles and spreads,
                            reducing your target to cinders."
                damage_scaling: 
                    damage_type: radiant
                    tier_3: "6d6"
                effect:
                    type: debuff 
                    description: "Anyone struck by the beam is instantly set ablaze and begins Burning."
                    conditions:
                        - burning
                    save: null
            -   name: Invulnerability
                action_type: "Offhand Action"
                type: buff
                cost: 2
                duration: 1
                range: touch
                requirements:
                    movement: true 
                    verbal: true 
                    components: 
                        - A dragonscale (100gp)
                description: "Magic suffuses your target, and their skin becomes hard as diamond even as all magics are repelled from them."
                effect: 
                    type: buff
                    description: "For the spell's duration, they are considered Invincible."
                    conditions:
                        - invincible
                    save: null
-   name: Wizard
    class_type: Battle Mage
    # expertise: "As a Wizard, you are marked by your raw intellect. Take expertise in all intelligence checks, including
    #             checks made to cast informal magic. Further, take expertise in history checks made to uncover lore 
    #             about a location or item."
    health_schedule: 
        starting_health: 6
        standard_level_health_bonus: 2
        tier_increase_health_bonus: 2
    handbook:
        -   title: Intro
            display_title: false
            text: "Students of the arcane, wizards are practitioners of world-bending magics.
                  Advanced wizards can take flight, smite their foes with balls of fire,
                  and bend time to their whim. Even fledgling wizards can summon magic familiars,
                  conjure candlight, and fill their foes mouths' with slithering slugs.
                  These advanced magics come at a price—wizards must study diligently to gain their power,
                  standing on the shoulders of giants as they strive to become legends in their own right."
        -   title: "When Adventuring"
            display_title: true 
            text: "A wizard's arsenal of spells is of great use when adventuring. The ability to become ethereal,
                    step between distant doors, and summon platforms are of immense value to any adventuring party.
                    With their great intelligence, wizards are also of use whenever questions of history,
                    geography, or intuition are encountered."
        -   title: "When Socializing"
            display_title: true 
            text: "Some wizards are scatterbrained, others stoic, and some are merely excited to see the world.
                    While a wizard might have trouble being the party's face when dealing with common folk,
                    they can be of enormous value whenever speaking with the intelligentsia of a region."
        -   title: When in Combat 
            display_title: true 
